<!DOCTYPE html>
<html>
<head>
<title>Cryptomice</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0f19;
color:white;
}

/* TOP BAR */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111827;
border-bottom:1px solid #1f2937;
}

.logo{
font-weight:bold;
color:#ffd700;
}

/* STATUS */
.status{
font-size:12px;
display:flex;
align-items:center;
}

.dot{
width:8px;
height:8px;
background:#00ff66;
border-radius:50%;
margin-right:5px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0.2;}
100%{opacity:1;}
}

/* HERO IMAGE (APP STYLE BANNER) */
.banner{
margin:15px;
border-radius:12px;
overflow:hidden;
position:relative;
}

.banner img{
width:100%;
display:block;
}

/* DARK OVERLAY */
.banner::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(180deg,transparent,rgba(0,0,0,0.7));
}

/* BALANCE CARD */
.card{
margin:15px;
padding:15px;
background:#111827;
border-radius:12px;
border:1px solid #1f2937;
}

.balance{
font-size:28px;
color:#ffd700;
margin:10px 0;
}

/* CHART */
.chart{
height:120px;
margin-top:10px;
position:relative;
}

.line{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to top,rgba(255,215,0,0.1),transparent);
}

svg{
width:100%;
height:100%;
}

path{
fill:none;
stroke:#ffd700;
stroke-width:2;
stroke-dasharray:400;
stroke-dashoffset:400;
animation:draw 4s linear infinite;
}

@keyframes draw{
0%{stroke-dashoffset:400;}
100%{stroke-dashoffset:0;}
}

/* BUTTONS */
.actions{
margin:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
margin-top:10px;
font-weight:bold;
cursor:pointer;
}

.primary{
background:#ffd700;
color:black;
}

.secondary{
background:#1f2937;
color:white;
}

/* STATS */
.stats{
display:flex;
justify-content:space-between;
margin:15px;
}

.stat{
background:#111827;
padding:10px;
border-radius:10px;
width:32%;
text-align:center;
border:1px solid #1f2937;
}

.stat h4{
margin:0;
color:#00e0ff;
}

.stat p{
margin:5px 0 0;
font-size:11px;
opacity:0.6;
}

/* FOOT NOTE */
.note{
text-align:center;
font-size:11px;
opacity:0.5;
margin:15px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
<div class="logo">CRYPTOMICE</div>
<div class="status"><div class="dot"></div>Connected</div>
</div>

<!-- HERO IMAGE -->
<div class="banner">
<img src="hero.png">
</div>

<!-- BALANCE -->
<div class="card">
<div style="font-size:12px;opacity:0.6;">Portfolio Value</div>
<div class="balance">$250,000</div>

<!-- CHART -->
<div class="chart">
<svg viewBox="0 0 100 50">
<path d="M0 40 L10 35 L20 38 L30 30 L40 32 L50 20 L60 25 L70 15 L80 18 L90 10 L100 5"/>
</svg>
</div>

</div>

<!-- STATS -->
<div class="stats">
<div class="stat">
<h4>1250</h4>
<p>Referrals</p>
</div>
<div class="stat">
<h4>$1</h4>
<p>Per Signup</p>
</div>
<div class="stat">
<h4>Secure</h4>
<p>Status</p>
</div>
</div>

<!-- ACTIONS -->
<div class="actions">
<button class="primary" onclick="goPayment()">Activate Account</button>
<button class="secondary" onclick="goLogin()">Login</button>
</div>

<div class="note">
Demo interface preview • earnings depend on usage
</div>

<script>
function goPayment(){
window.location.href="payment.html";
}
function goLogin(){
window.location.href="payment.html";
}
</script>

</body>
  </html>
