<!DOCTYPE html>
<html>
<head>
<title>Cryptomice</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#05070c;
color:white;
overflow-x:hidden;
}

/* BACKGROUND EFFECT */
body::before{
content:"";
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#d4af37 0%,transparent 60%);
opacity:0.05;
top:-50%;
left:-50%;
animation:moveBg 15s linear infinite;
}

@keyframes moveBg{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* HEADER */
.hero{
text-align:center;
padding:30px 20px 10px;
}

.logo{
font-size:26px;
font-weight:bold;
letter-spacing:2px;
background:linear-gradient(90deg,#ffd700,#ffcc00,#d4af37);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 15px rgba(255,215,0,0.4);
}

.tag{
font-size:13px;
opacity:0.7;
margin-top:5px;
}

/* DASHBOARD PREVIEW */
.preview{
margin:20px;
padding:20px;
border-radius:15px;
background:rgba(255,215,0,0.05);
border:1px solid rgba(255,215,0,0.2);
box-shadow:0 0 30px rgba(255,215,0,0.15);
backdrop-filter:blur(10px);
animation:fadeUp .6s ease;
}

.preview h3{
text-align:center;
margin-top:0;
color:#ffd700;
}

/* HIDDEN ID */
.hidden-id{
font-size:12px;
opacity:0.5;
text-align:center;
margin-bottom:10px;
}

/* BALANCE */
.balance{
font-size:40px;
text-align:center;
font-weight:bold;
background:linear-gradient(90deg,#ffd700,#ffcc00,#fff1a8);
-webkit-background-clip:text;
color:transparent;
text-shadow:0 0 20px rgba(255,215,0,0.6);
margin:10px 0;
}

/* LABEL */
.label{
text-align:center;
font-size:12px;
opacity:0.7;
margin-bottom:15px;
}

/* STATS */
.stats{
display:flex;
justify-content:space-between;
margin-top:15px;
}

.stat{
background:rgba(0,0,0,0.4);
border:1px solid rgba(255,215,0,0.2);
padding:12px;
border-radius:10px;
width:48%;
text-align:center;
}

.stat h4{
margin:0;
color:#ffd700;
}

.stat p{
margin:5px 0 0;
font-size:12px;
opacity:0.7;
}

/* BUTTONS */
.cta{
margin:20px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-weight:bold;
font-size:15px;
cursor:pointer;
transition:.2s;
}

.primary{
background:linear-gradient(90deg,#ffd700,#ffcc00);
color:black;
box-shadow:0 0 20px rgba(255,215,0,0.5);
}

.primary:hover{
transform:translateY(-2px);
box-shadow:0 0 30px rgba(255,215,0,0.8);
}

.secondary{
background:#111;
color:white;
margin-top:10px;
}

/* MONEY DECOR */
.money-deco{
text-align:center;
margin-top:10px;
font-size:18px;
opacity:0.3;
letter-spacing:8px;
}

/* NOTE */
.note{
margin:15px;
font-size:12px;
opacity:0.6;
text-align:center;
}

/* ANIMATION */
@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="hero">
<div class="logo">CRYPTOMICE 🐭</div>
<div class="tag">Crypto Referral Vault</div>
</div>

<div class="preview">

<h3>Dashboard Preview</h3>

<div class="hidden-id">
User ID: ••••••••• (hidden)
</div>

<div class="balance">$250,000</div>

<div class="label">Pending Withdrawal (Preview)</div>

<div class="stats">
<div class="stat">
<h4>1250</h4>
<p>Referrals</p>
</div>

<div class="stat">
<h4>$1</h4>
<p>Per Signup</p>
</div>
</div>

<div class="money-deco">
💰 💰 💰 💰 💰
</div>

</div>

<div class="cta">
<button class="primary" onclick="goPayment()">Enter Vault</button>
<button class="secondary" onclick="goLogin()">Member Login</button>
</div>

<div class="note">
Preview shown for demonstration. Earnings depend on usage.
</div>

<script>
function goPayment(){
window.location.href="payment.html";
}

function goLogin(){
window.location.href="payment.html";
}
</script>

</body>
  </html>
