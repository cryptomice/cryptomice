<!DOCTYPE html>
<html>
<head>
<title>Cryptomice</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#0b0f19;
color:white;
}

/* HEADER */
.header{
padding:15px;
text-align:center;
background:#111827;
border-bottom:1px solid #222;
}

.logo{
font-size:20px;
font-weight:bold;
color:#ffd700;
letter-spacing:1px;
}

/* DASHBOARD PREVIEW */
.dashboard{
margin:20px;
padding:20px;
border-radius:12px;
background:#111827;
border:1px solid #1f2937;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:10px;
font-size:13px;
opacity:0.7;
}

.balance{
font-size:34px;
font-weight:bold;
color:#ffd700;
margin:10px 0;
}

.card{
background:#0f172a;
padding:12px;
border-radius:10px;
margin-top:10px;
border:1px solid #1f2937;
}

.card h4{
margin:0;
color:#00e0ff;
}

.card p{
margin:5px 0 0;
font-size:12px;
opacity:0.7;
}

/* BUTTONS */
.cta{
margin:20px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.primary{
background:#ffd700;
color:black;
}

.secondary{
background:#1f2937;
color:white;
margin-top:10px;
}

/* FOOT NOTE */
.note{
text-align:center;
font-size:12px;
opacity:0.5;
margin:15px;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">CRYPTOMICE</div>
</div>

<div class="dashboard">

<div class="row">
<span>User</span>
<span>•••••••• (hidden)</span>
</div>

<div class="balance">$250,000</div>

<div style="font-size:12px;opacity:0.6;">
Pending Withdrawal (Preview)
</div>

<div class="card">
<h4>Referrals</h4>
<p>Track earnings from invited users</p>
</div>

<div class="card">
<h4>Earnings</h4>
<p>$1 credited per approved signup</p>
</div>

</div>

<div class="cta">
<button class="primary" onclick="goPayment()">Activate Access</button>
<button class="secondary" onclick="goLogin()">Login</button>
</div>

<div class="note">
Preview interface for demonstration. Actual results depend on usage.
</div>

<script>
function goPayment(){
window.location.href="payment.html";
}
function goLogin(){
window.location.href="payment.html";
}
</script>

</body>
</html>
