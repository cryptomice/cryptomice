<!DOCTYPE html>
<html>
<head>
<title>Cryptomice Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:system-ui, Arial, sans-serif;
background:#05070c;
color:#fff;
overflow-x:hidden;
}

/* BACKGROUND GLOW */
body::before{
content:"";
position:fixed;
top:-200px;
left:-200px;
width:500px;
height:500px;
background:radial-gradient(circle,#00ffcc33,transparent 60%);
filter:blur(60px);
z-index:-1;
}

.hero{
text-align:center;
padding:40px 20px 10px;
background:linear-gradient(180deg,#081225,#05070c);
}

.logo{
font-size:26px;
font-weight:800;
letter-spacing:3px;
color:#00ffd5;
text-shadow:0 0 15px #00ffd555;
}

.tag{
font-size:13px;
opacity:0.7;
margin-top:6px;
}

/* CARD */
.card{
margin:20px;
padding:22px;
border-radius:18px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
box-shadow:0 10px 40px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.08);
animation:fadeUp .6s ease;
}

.card h3{
margin:0 0 15px;
text-align:center;
}

/* USER ID */
.user{
text-align:center;
font-size:12px;
opacity:0.6;
margin-bottom:10px;
}

/* BALANCE */
.balance{
font-size:34px;
text-align:center;
font-weight:bold;
color:#00ffcc;
text-shadow:0 0 20px #00ffcc55;
}

.balance-label{
text-align:center;
font-size:12px;
opacity:0.7;
margin-bottom:20px;
}

/* GRID */
.grid{
display:flex;
gap:10px;
margin-top:15px;
}

.box{
flex:1;
padding:14px;
border-radius:12px;
background:rgba(255,255,255,0.04);
text-align:center;
border:1px solid rgba(255,255,255,0.06);
}

.box h4{
margin:0;
color:#00eaff;
}

.box p{
margin:5px 0 0;
font-size:12px;
opacity:0.7;
}

/* BUTTONS */
.cta{
margin:20px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-weight:600;
cursor:pointer;
font-size:14px;
}

.primary{
background:linear-gradient(90deg,#00ff9d,#00c2ff);
color:#00110d;
box-shadow:0 0 25px rgba(0,255,180,0.3);
}

.secondary{
margin-top:10px;
background:rgba(255,255,255,0.06);
color:#fff;
}

/* NOTE */
.note{
text-align:center;
font-size:11px;
opacity:0.5;
padding:10px 20px 30px;
}

/* ANIMATION */
@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<div class="hero">
<div class="logo">CRYPTOMICE</div>
<div class="tag">Crypto Referral Dashboard (Demo UI)</div>
</div>

<div class="card">

<h3>Dashboard Overview</h3>

<div class="user">
User ID: ****-****-hidden
</div>

<div class="balance">
$0.00
</div>

<div class="balance-label">
Simulated Wallet Balance
</div>

<div class="grid">

<div class="box">
<h4>0</h4>
<p>Referrals</p>
</div>

<div class="box">
<h4>--</h4>
<p>Avg Reward</p>
</div>

</div>

</div>

<div class="cta">
<button class="primary" onclick="goActivate()">Activate Demo Account</button>
<button class="secondary" onclick="goLogin()">Member Login</button>
</div>

<div class="note">
This is a UI demonstration only. No real earnings, payments, or withdrawals are implied.
</div>

<script>
function goActivate(){
window.location.href="payment.html";
}

function goLogin(){
window.location.href="login.html";
}
</script>

</body>
</html>
