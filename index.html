<!DOCTYPE html>
<html>
<head>
<title>Cryptomice</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
background:#000;
overflow:hidden;
font-family:Arial, sans-serif;
}

/* FULL IMAGE */
.hero{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;

/* subtle movement */
animation:zoomMove 14s ease-in-out infinite;
}

/* zoom animation */
@keyframes zoomMove{
0%{transform:scale(1) translate(0,0);}
50%{transform:scale(1.04) translate(-1%,1%);}
100%{transform:scale(1) translate(0,0);}
}

/* shimmer */
.shimmer{
position:absolute;
top:0;
left:-100%;
width:200%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.07),
transparent
);
animation:shine 7s infinite;
pointer-events:none;
}

@keyframes shine{
0%{left:-100%;}
100%{left:100%;}
}

/* CLICK AREA */
.click-area{
position:absolute;
bottom:14%;
left:50%;
transform:translateX(-50%);
width:75%;
height:65px;
border-radius:10px;
cursor:pointer;
}

/* subtle glow */
.click-area::after{
content:"";
position:absolute;
width:100%;
height:100%;
border-radius:10px;
box-shadow:0 0 0 rgba(255,215,0,0.3);
animation:pulse 2.2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 rgba(255,215,0,0);}
50%{box-shadow:0 0 25px rgba(255,215,0,0.25);}
100%{box-shadow:0 0 0 rgba(255,215,0,0);}
}

/* TAP EFFECT */
.ripple{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.3);
transform:scale(0);
animation:rippleAnim 0.6s linear;
pointer-events:none;
}

@keyframes rippleAnim{
to{
transform:scale(4);
opacity:0;
}
}
</style>
</head>

<body>

<div class="hero">

<img src="file_00000000957871f5933ba799b9ea7eb1.png">

<div class="shimmer"></div>

<div class="click-area" onclick="handleClick(event)"></div>

</div>

<script>
function handleClick(e){

// ripple effect
const ripple = document.createElement("span");
ripple.classList.add("ripple");

const rect = e.target.getBoundingClientRect();
ripple.style.left = (e.clientX - rect.left) + "px";
ripple.style.top = (e.clientY - rect.top) + "px";

e.target.appendChild(ripple);

setTimeout(()=>{
ripple.remove();
window.location.href="payment.html";
},300);
}
</script>

</body>
</html>
