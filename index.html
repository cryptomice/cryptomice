<!DOCTYPE html>
<html>
<head>
<title>Cryptomice</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body{
margin:0;
padding:0;
height:100%;
background:black;
overflow:hidden;
}

/* WRAPPER */
.wrapper{
position:relative;
width:100%;
height:100vh;
}

/* IMAGE */
.wrapper img{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
pointer-events:none; /* IMPORTANT: allows clicks to pass through */
}

/* BUTTON LAYER */
.btn{
position:absolute;
z-index:10;
cursor:pointer;
border-radius:12px;
transition:0.2s;
}

/* ACTIVATE AREA */
.activate{
top:47%;
left:5%;
width:32%;
height:10%;
}

/* LOGIN AREA */
.login{
top:60%;
left:5%;
width:32%;
height:10%;
}

/* TAP FEEDBACK */
.btn:active{
background:rgba(255,255,255,0.15);
transform:scale(0.98);
}

/* OPTIONAL HOVER (DESKTOP) */
@media (hover:hover){
.btn:hover{
box-shadow:0 0 20px rgba(255,215,0,0.6);
}
}

/* DEBUG MODE (UNCOMMENT IF NEEDED) */
/*
.btn{
background:rgba(255,0,0,0.25);
}
*/
</style>
</head>

<body>

<div class="wrapper">

<img src="file_00000000957871f5933ba799b9ea7eb1.png" alt="Cryptomice UI">

<div class="btn activate" onclick="goPayment()"></div>
<div class="btn login" onclick="goLogin()"></div>

</div>

<script>
function goPayment(){
window.location.href = "payment.html";
}

function goLogin(){
window.location.href = "payment.html";
}
</script>

</body>
</html>
