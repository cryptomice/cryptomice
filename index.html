<!DOCTYPE html>
<html>
<head>
<title>Cryptomice</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
background:#000;
overflow:hidden;
font-family:Arial, sans-serif;
}

/* FULLSCREEN IMAGE */
.hero{
position:relative;
width:100vw;
height:100vh;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
animation:zoomMove 14s ease-in-out infinite;
}

/* CINEMATIC MOTION */
@keyframes zoomMove{
0%{transform:scale(1) translate(0,0);}
50%{transform:scale(1.04) translate(-1%,1%);}
100%{transform:scale(1) translate(0,0);}
}

/* LIGHT SHIMMER */
.shimmer{
position:absolute;
top:0;
left:-100%;
width:200%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.06),
transparent
);
animation:shine 10s infinite;
pointer-events:none;
}

@keyframes shine{
0%{left:-100%;}
100%{left:100%;}
}

/* CLICK AREA */
.click-area{
position:absolute;
bottom:18%;
left:50%;
transform:translateX(-50%);

width:75%;
height:65px;

cursor:pointer;
border-radius:10px;
}

/* SUBTLE GLOW */
.click-area::after{
content:"";
position:absolute;
width:100%;
height:100%;
border-radius:10px;
box-shadow:0 0 0 rgba(255,215,0,0.4);
animation:pulse 2.5s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 0 rgba(255,215,0,0);}
50%{box-shadow:0 0 25px rgba(255,215,0,0.25);}
100%{box-shadow:0 0 0 rgba(255,215,0,0);}
}

/* TAP EFFECT */
.tap{
position:absolute;
width:100px;
height:100px;
background:rgba(255,215,0,0.3);
border-radius:50%;
transform:scale(0);
animation:ripple 0.5s ease-out;
pointer-events:none;
}

@keyframes ripple{
to{
transform:scale(2);
opacity:0;
}
}

</style>
</head>

<body>

<div class="hero">

<img src="file_00000000957871f5933ba799b9ea7eb1.png">

<div class="shimmer"></div>

<div class="click-area" onclick="handleClick(event)"></div>

</div>

<script>

function handleClick(e){
createRipple(e);
setTimeout(()=>{
window.location.href="payment.html";
},150);
}

function createRipple(e){
const ripple = document.createElement("div");
ripple.className = "tap";

ripple.style.left = (e.clientX - 50) + "px";
ripple.style.top = (e.clientY - 50) + "px";

document.body.appendChild(ripple);

setTimeout(()=>ripple.remove(),500);
}

</script>

</body>
</html>
