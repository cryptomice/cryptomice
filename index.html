<!DOCTYPE html>
<html>
<head>
<title>Cryptomice</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
background:black;
}

/* HERO IMAGE */
.hero{
position:relative;
width:100%;
height:100vh;
background:url("https://chat.openai.com/mnt/data/a_high_gloss_futuristic_crypto_themed_landing_pag.png") no-repeat center center;
background-size:cover;
}

/* BUTTONS */
.btn{
position:absolute;
cursor:pointer;
}

/* ACTIVATE BUTTON */
.activate{
top:48%;
left:6%;
width:26%;
height:8%;
}

/* LOGIN BUTTON */
.login{
top:58%;
left:6%;
width:26%;
height:8%;
}

/* OPTIONAL HOVER EFFECT */
.btn:hover{
outline:2px solid rgba(255,215,0,0.7);
border-radius:8px;
}
</style>
</head>

<body>

<div class="hero">

<div class="btn activate" onclick="goPayment()"></div>
<div class="btn login" onclick="goLogin()"></div>

</div>

<script>
function goPayment(){
window.location.href="payment.html";
}

function goLogin(){
window.location.href="payment.html";
}
</script>

</body>
</html>
