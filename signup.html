<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Create Account</h2>

<input id="email" placeholder="Email"
style="padding:10px;width:100%;margin:5px 0;">

<input id="password" type="password" placeholder="Password"
style="padding:10px;width:100%;margin:5px 0;">

<button id="signupBtn" style="padding:10px;width:100%;">
Create Account
</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  deleteDoc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function getRef() {
  return new URLSearchParams(window.location.search).get("ref");
}

document.getElementById("signupBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");
  const ref = getRef();

  if (!email || !password) {
    msg.innerText = "Fill all fields";
    return;
  }

  try {

    // 1. CHECK APPROVAL FIRST
    const approvalSnap = await getDoc(doc(db, "approvedEmails", email));

    if (!approvalSnap.exists()) {
      msg.style.color = "red";
      msg.innerText = "Access denied: Payment not approved yet (wait up to 24h)";
      return;
    }

    // 2. CREATE AUTH ACCOUNT
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const uid = userCred.user.uid;

    // 3. CREATE USER PROFILE
    await setDoc(doc(db, "users", uid), {
      email,
      referrals: 0,
      earnings: 0,
      referredBy: ref || null,
      createdAt: new Date()
    });

    // 4. REFERRAL REWARD (ONLY AFTER ACCOUNT CREATION)
    if (ref) {

      const refUserRef = doc(db, "users", ref);
      const refSnap = await getDoc(refUserRef);

      if (refSnap.exists()) {

        await updateDoc(refUserRef, {
          referrals: increment(1),
          earnings: increment(1)
        });

      }
    }

    // 5. DELETE APPROVAL (EMAIL CONSUMED)
    await deleteDoc(doc(db, "approvedEmails", email));

    msg.style.color = "green";
    msg.innerText = "Account created successfully";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1000);

  } catch (e) {
    msg.style.color = "red";
    msg.innerText = e.message;
  }

});

</script>

</body>
</html>
