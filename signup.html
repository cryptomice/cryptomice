<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Create Account</h2>

<p>Create your account after payment approval.</p>

<input id="email" placeholder="Email"
style="padding:10px;width:100%;margin:5px 0;">

<input id="password" type="password" placeholder="Password"
style="padding:10px;width:100%;margin:5px 0;">

<button id="signupBtn" style="padding:10px;width:100%;">
Create Account
</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
updateDoc,
increment
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
authDomain: "cryptomice-635eb.firebaseapp.com",
projectId: "cryptomice-635eb",
storageBucket: "cryptomice-635eb.firebasestorage.app",
messagingSenderId: "831908710470",
appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* READ REFERRAL (PERSISTENT) */
const referrer =
localStorage.getItem("referrer") ||
sessionStorage.getItem("referrer");

document.getElementById("signupBtn").addEventListener("click", async () => {

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();
const msg = document.getElementById("msg");

if(!email || !password){
msg.innerText = "Fill all fields";
return;
}

try{

const userCred = await createUserWithEmailAndPassword(auth,email,password);
const uid = userCred.user.uid;

/* CREATE USER */
await setDoc(doc(db,"users",uid),{
email: email,
referrals: 0,
earnings: 0,
createdAt: new Date()
});

/* CREDIT REFERRER */
if(referrer){

const refDoc = doc(db,"users",referrer);
const snap = await getDoc(refDoc);

if(snap.exists()){

await updateDoc(refDoc,{
referrals: increment(1),
earnings: increment(1)
});

}

/* CLEAR REFERRAL AFTER CREDIT */
localStorage.removeItem("referrer");
sessionStorage.removeItem("referrer");

}

msg.style.color="green";
msg.innerText="Account created successfully";

setTimeout(()=>{
window.location.href="dashboard.html";
},1500);

}catch(e){
msg.innerText = e.message;
}

});

</script>

</body>
</html>
