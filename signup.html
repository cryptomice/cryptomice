<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Create Account</h2>

<input id="email" placeholder="Email"
style="padding:10px;width:100%;margin:5px 0;">

<input id="password" type="password" placeholder="Password"
style="padding:10px;width:100%;margin:5px 0;">

<button id="signupBtn" style="padding:10px;width:100%;">
Create Account
</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
authDomain: "cryptomice-635eb.firebaseapp.com",
projectId: "cryptomice-635eb",
storageBucket: "cryptomice-635eb.firebasestorage.app",
messagingSenderId: "831908710470",
appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("signupBtn").addEventListener("click", async () => {

const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value.trim();
const msg = document.getElementById("msg");

if(!email || !password){
msg.innerText = "Fill all fields";
return;
}

/* FIND APPROVED PAYMENT SAFELY */
const payments = await getDocs(collection(db,"payments"));

let paymentDoc = null;
let referrer = null;

payments.forEach(d => {
const data = d.data();

if(
data.email === email &&
data.status === "approved"
){
paymentDoc = d.id;
referrer = data.referrer;
}
});

if(!paymentDoc){
msg.innerText = "No approved payment found";
return;
}

/* CREATE USER */
const userCred = await createUserWithEmailAndPassword(auth,email,password);
const uid = userCred.user.uid;

await setDoc(doc(db,"users",uid),{
email,
referrals:0,
earnings:0,
createdAt:serverTimestamp()
});

/* CREDIT REFERRER */
if(referrer){
await updateDoc(doc(db,"users",referrer),{
referrals: increment(1),
earnings: increment(1)
});
}

/* MARK PAYMENT USED */
await updateDoc(doc(db,"payments",paymentDoc),{
status:"used"
});

msg.style.color="green";
msg.innerText="Account created";

setTimeout(()=>{
window.location.href="dashboard.html";
},1500);

});

</script>

</body>
</html>
