<!DOCTYPE html>
<html>
<head>
  <title>Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Create Account</h2>

<input id="email" type="email" placeholder="Email" style="display:block;width:100%;padding:10px;margin:10px 0;">
<input id="password" type="password" placeholder="Password" style="display:block;width:100%;padding:10px;margin:10px 0;">

<button id="signupBtn" style="padding:10px;width:100%;">
Sign Up
</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Capture referral from URL (?ref=USERID)
const urlParams = new URLSearchParams(window.location.search);
const referrer = urlParams.get("ref");

document.getElementById("signupBtn").addEventListener("click", async () => {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    // Create auth user
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // Save user in Firestore with referral info
    await setDoc(doc(db, "users", user.uid), {
      email: user.email,
      referrer: referrer || null,
      createdAt: new Date()
    });

    document.getElementById("msg").innerText = "Account created successfully!";
    window.location.href = "login.html";

  } catch (error) {
    document.getElementById("msg").innerText = error.message;
  }
});
</script>

</body>
</html>
