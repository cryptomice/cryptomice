<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Create Account</h2>

<input id="email" placeholder="Email"
style="padding:10px;width:100%;margin:5px 0;">

<input id="password" type="password" placeholder="Password"
style="padding:10px;width:100%;margin:5px 0;">

<button id="signupBtn" style="padding:10px;width:100%;">
Create Account
</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDocs, collection, query, where, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("signupBtn").addEventListener("click", async () => {

const email = document.getElementById("email").value.trim();
const password = document.getElementById("password").value.trim();
const msg = document.getElementById("msg");

if(!email || !password){
msg.innerText = "Fill all fields";
return;
}

/* FIND APPROVED PAYMENT */
const q = query(
  collection(db,"payments"),
  where("email","==",email),
  where("status","==","approved")
);

const snap = await getDocs(q);

if(snap.empty){
msg.innerText = "No approved payment found";
return;
}

let referrer = null;
let paymentDocId = null;

snap.forEach(d=>{
referrer = d.data().referrer;
paymentDocId = d.id;
});

const userCred = await createUserWithEmailAndPassword(auth,email,password);
const uid = userCred.user.uid;

await setDoc(doc(db,"users",uid),{
email,
referrals:0,
earnings:0,
createdAt:serverTimestamp()
});

/* CREDIT REFERRER */
if(referrer){
await updateDoc(doc(db,"users",referrer),{
referrals: increment(1),
earnings: increment(1)
});
}

/* PREVENT DOUBLE USE */
await updateDoc(doc(db,"payments",paymentDocId),{
status:"used"
});

msg.style.color="green";
msg.innerText="Account created";

setTimeout(()=>{
window.location.href="dashboard.html";
},1500);

});

</script>

</body>
</html>
