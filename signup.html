<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Create Account</h2>

<p style="color:gray;">
Only approved users can create an account.
</p>

<input id="email" type="email" placeholder="Enter approved email"
style="padding:10px;width:100%;margin:5px 0;">

<input id="password" type="password" placeholder="Create password"
style="padding:10px;width:100%;margin:5px 0;">

<button id="signupBtn" style="padding:10px;width:100%;">
Create Account
</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword,
  fetchSignInMethodsForEmail
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// referral
const urlParams = new URLSearchParams(window.location.search);
const ref = urlParams.get("ref");

// SIGN UP
document.getElementById("signupBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const msg = document.getElementById("msg");

  if (!email || !password) {
    msg.style.color = "red";
    msg.innerText = "Fill all fields";
    return;
  }

  try {

    // 1. CHECK IF ACCOUNT ALREADY EXISTS
    const methods = await fetchSignInMethodsForEmail(auth, email);

    if (methods.length > 0) {
      msg.style.color = "red";
      msg.innerText = "Account already exists. Please login.";
      return;
    }

    // 2. CHECK IF EMAIL IS APPROVED BY ADMIN
    const approvedRef = doc(db, "approvedEmails", email);
    const approvedSnap = await getDoc(approvedRef);

    if (!approvedSnap.exists()) {
      msg.style.color = "red";
      msg.innerText = "Payment not approved yet.";
      return;
    }

    // 3. CREATE USER ACCOUNT
    const userCred = await createUserWithEmailAndPassword(auth, email, password);
    const uid = userCred.user.uid;

    // 4. SAVE USER DATA
    await setDoc(doc(db, "users", uid), {
      email: email,
      referrals: 0,
      earnings: 0,
      referredBy: ref || null
    });

    // 5. DELETE APPROVAL (ONE-TIME USE EMAIL)
    await deleteDoc(doc(db, "approvedEmails", email));

    msg.style.color = "green";
    msg.innerText = "Account created successfully";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1200);

  } catch (e) {
    msg.style.color = "red";
    msg.innerText = e.message;
  }

});
</script>

</body>
</html>
