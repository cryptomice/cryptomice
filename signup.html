<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { getFirestore, doc, setDoc, getDoc, updateDoc, increment } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.addEventListener("load", () => {

  const emailEl = document.getElementById("email");
  const passEl = document.getElementById("password");
  const btn = document.getElementById("signupBtn");
  const msg = document.getElementById("msg");

  if (!emailEl || !passEl || !btn || !msg) {
    document.body.innerHTML = "<h3>Signup page error: missing elements</h3>";
    return;
  }

  const referrerId = new URLSearchParams(window.location.search).get("ref");

  btn.addEventListener("click", async () => {

    try {
      const userCredential = await createUserWithEmailAndPassword(
        auth,
        emailEl.value,
        passEl.value
      );

      const user = userCredential.user;

      await setDoc(doc(db, "users", user.uid), {
        email: emailEl.value,
        referrer: referrerId || null,
        referrals: 0,
        earnings: 0
      });

      if (referrerId) {
        const refDoc = doc(db, "users", referrerId);
        const snap = await getDoc(refDoc);

        if (snap.exists()) {
          await updateDoc(refDoc, {
            referrals: increment(1),
            earnings: increment(1)
          });
        }
      }

      msg.innerText = "Account created successfully!";
      window.location.href = "login.html";

    } catch (e) {
      msg.innerText = e.message;
    }

  });

});
</script>
