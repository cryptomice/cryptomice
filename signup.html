<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { 
getAuth,
createUserWithEmailAndPassword,
fetchSignInMethodsForEmail
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
deleteDoc,
updateDoc,
increment
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
authDomain: "cryptomice-635eb.firebaseapp.com",
projectId: "cryptomice-635eb",
storageBucket: "cryptomice-635eb.firebasestorage.app",
messagingSenderId: "831908710470",
appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* SAFE REFERRAL HANDLING */
let ref = localStorage.getItem("referrer");

/* BLOCK INVALID REFERRAL VALUES */
if(ref && ref.includes("http")){
ref = null;
}

document.getElementById("signupBtn").addEventListener("click", async () => {

const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value.trim();
const msg = document.getElementById("msg");

if (!email || !password){
msg.innerText="Fill all fields";
return;
}

try{

const methods = await fetchSignInMethodsForEmail(auth,email);
if(methods.length>0){
msg.innerText="Account exists";
return;
}

/* FIX: SAFE PAYMENT CHECK */
const approvedSnap = await getDoc(doc(db,"approvedEmails",email));

if(!approvedSnap.exists()){
msg.innerText="Payment not approved yet";
return;
}

const userCred = await createUserWithEmailAndPassword(auth,email,password);
const uid = userCred.user.uid;

/* CREATE USER */
await setDoc(doc(db,"users",uid),{
email,
referrals:0,
earnings:0,
createdAt:new Date()
});

/* CREDIT REFERRER SAFELY */
if(ref){

const refSnap = await getDoc(doc(db,"users",ref));

if(refSnap.exists()){
await updateDoc(doc(db,"users",ref),{
referrals: increment(1),
earnings: increment(1)
});
}

localStorage.removeItem("referrer");
}

/* CLEAN UP */
await deleteDoc(doc(db,"approvedEmails",email));

msg.style.color="green";
msg.innerText="Account created";

setTimeout(()=>{
window.location.href="dashboard.html";
},1000);

}catch(e){
msg.innerText=e.message;
}

});

  </script>
