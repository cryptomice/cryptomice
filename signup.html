<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#070b14;
color:white;
}

/* HEADER */
.header{
padding:15px;
text-align:center;
background:#111827;
border-bottom:1px solid #1f2937;
}

.header h2{
margin:0;
color:#ffd700;
}

/* CONTAINER */
.container{
max-width:500px;
margin:20px auto;
padding:15px;
}

/* CARD */
.card{
background:#0b1220;
border:1px solid #1f2937;
border-radius:12px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* TEXT */
.note{
font-size:13px;
opacity:0.7;
margin-bottom:15px;
}

/* INPUTS */
input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:1px solid #1f2937;
background:#111827;
color:white;
}

/* BUTTON */
button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
background:linear-gradient(90deg,#ffd700,#ffcc00);
color:black;
}

/* MESSAGE */
.msg{
margin-top:10px;
font-size:13px;
}

/* SMALL FOOT */
.footer{
text-align:center;
font-size:12px;
opacity:0.5;
margin-top:20px;
}
</style>
</head>

<body>

<div class="header">
<h2>🐭 CRYPTOMICE</h2>
</div>

<div class="container">

<div class="card">

<h3 style="color:#ffd700;margin-top:0;">Create Account</h3>

<p class="note">
Only approved users can create an account.
</p>

<input id="email" placeholder="Enter approved email">
<input id="password" type="password" placeholder="Create password">

<button id="signupBtn">
Create Account
</button>

<p id="msg" class="msg"></p>

</div>

<div class="footer">
Secure account creation • Referral system active
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  collection,
  addDoc,
  increment
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ref = localStorage.getItem("referrer");

document.getElementById("signupBtn").addEventListener("click", async () => {

const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value.trim();
const msg = document.getElementById("msg");

if (!email || !password) {
  msg.innerText = "Fill all fields";
  msg.style.color = "red";
  return;
}

try {

const userCred = await createUserWithEmailAndPassword(auth,email,password);
const uid = userCred.user.uid;

/* CREATE USER */
await setDoc(doc(db,"users",uid),{
email,
referrals:0,
earnings:0,
createdAt:new Date()
});

/* STORE REFERRAL */
if (ref) {
  await addDoc(collection(db,"referrals"),{
    referrerId: ref,
    newUserId: uid,
    email,
    createdAt: new Date(),
    credited: true
  });

  await setDoc(doc(db,"users",ref),{
    referrals: increment(1),
    earnings: increment(1)
  }, { merge:true });

  localStorage.removeItem("referrer");
}

msg.style.color="#00ff99";
msg.innerText="Account created";

setTimeout(()=>{
window.location.href="dashboard.html";
},1000);

}catch(e){
msg.style.color="red";
msg.innerText=e.message;
}

});
</script>

</body>
</html>
