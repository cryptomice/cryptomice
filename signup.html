<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Create Account</h2>

<p style="color:gray;">
Only approved users can create an account.
</p>

<input id="email" type="email" placeholder="Enter approved email"
style="padding:10px;width:100%;margin:5px 0;">

<input id="password" type="password" placeholder="Create password"
style="padding:10px;width:100%;margin:5px 0;">

<button id="signupBtn" style="padding:10px;width:100%;">
Create Account
</button>

<p id="msg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
getAuth,
createUserWithEmailAndPassword,
fetchSignInMethodsForEmail
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
deleteDoc,
updateDoc,
increment
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
authDomain: "cryptomice-635eb.firebaseapp.com",
projectId: "cryptomice-635eb",
storageBucket: "cryptomice-635eb.firebasestorage.app",
messagingSenderId: "831908710470",
appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* SAFE REF */
let ref = null;
try {
  ref = localStorage.getItem("referrer");
} catch (e) {
  console.error("Ref load error:", e);
}

document.getElementById("signupBtn").addEventListener("click", async () => {

const emailEl = document.getElementById("email");
const passwordEl = document.getElementById("password");
const msg = document.getElementById("msg");

const email = (emailEl.value || "").trim().toLowerCase();
const password = (passwordEl.value || "").trim();

if (!email || !password){
msg.innerText="Fill all fields";
return;
}

try {

/* CHECK IF ACCOUNT EXISTS */
const methods = await fetchSignInMethodsForEmail(auth,email);
if(methods.length>0){
msg.innerText="Account exists";
return;
}

/* CHECK APPROVAL SAFELY */
const approvedSnap = await getDoc(doc(db,"approvedEmails",email));

if(!approvedSnap.exists()){
msg.innerText="Payment not approved yet";
return;
}

/* CREATE USER */
const userCred = await createUserWithEmailAndPassword(auth,email,password);
const uid = userCred.user.uid;

/* CREATE USER PROFILE */
await setDoc(doc(db,"users",uid),{
email,
referrals:0,
earnings:0,
createdAt:new Date()
});

/* SAFE REFERRAL CREDIT */
if(ref){

try {
  const refUserRef = doc(db,"users",ref);
  await updateDoc(refUserRef,{
    referrals:increment(1),
    earnings:increment(1)
  });
} catch(e){
  console.error("Referral credit failed:", e);
}

localStorage.removeItem("referrer");
}

/* REMOVE APPROVED EMAIL */
await deleteDoc(doc(db,"approvedEmails",email));

msg.style.color="green";
msg.innerText="Account created";

setTimeout(()=>{
window.location.href="dashboard.html";
},1000);

}catch(e){
console.error(e);
msg.innerText="Signup failed: "+e.message;
}

});

</script>

</body>
</html>
