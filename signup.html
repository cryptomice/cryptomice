<!DOCTYPE html>
<html>
<head>
  <title>Create Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Create Account</h2>

<p id="msg" style="color:red;"></p>

<input id="email" type="email" placeholder="Email"
style="padding:10px;width:100%;margin:5px 0;">

<input id="password" type="password" placeholder="Password"
style="padding:10px;width:100%;margin:5px 0;">

<button id="signupBtn" style="padding:10px;width:100%;">
Create Account
</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword 
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { 
  getFirestore,
  collection,
  query,
  where,
  getDocs,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("signupBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  if (!email || !password) {
    msg.innerText = "Fill all fields";
    return;
  }

  try {

    // STEP 1: CHECK IF PAYMENT EXISTS AND IS APPROVED
    const q = query(
      collection(db, "payments"),
      where("email", "==", email),
      where("status", "==", "approved")
    );

    const snap = await getDocs(q);

    if (snap.empty) {
      msg.innerText =
        "Access denied: Payment not approved yet (wait up to 24 hours after payment)";
      return;
    }

    // STEP 2: CREATE FIREBASE USER
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const user = userCredential.user;

    // STEP 3: CREATE USER PROFILE
    await setDoc(doc(db, "users", user.uid), {
      email: email,
      referrals: 0,
      earnings: 0,
      createdAt: new Date()
    });

    msg.style.color = "green";
    msg.innerText = "Account created successfully! Redirecting...";

    setTimeout(() => {
      window.location.href = "login.html";
    }, 1500);

  } catch (error) {
    msg.innerText = error.message;
  }

});
</script>

</body>
</html>
