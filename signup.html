<!DOCTYPE html>
<html>
<head>
<title>Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#050812;
color:white;
overflow-x:hidden;
}

/* ✨ GOLD MOVING BACKGROUND */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%, rgba(255,215,0,0.18), transparent 40%),
radial-gradient(circle at 80% 60%, rgba(255,215,0,0.10), transparent 45%),
radial-gradient(circle at 40% 80%, rgba(255,255,255,0.06), transparent 50%);
animation:goldFlow 8s infinite alternate ease-in-out;
pointer-events:none;
z-index:0;
}

@keyframes goldFlow{
0%{transform:scale(1) rotate(0deg);}
100%{transform:scale(1.15) rotate(2deg);}
}

/* GLOBAL LAYER */
*{
position:relative;
z-index:1;
}

/* HEADER */
.header{
padding:15px;
text-align:center;
background:rgba(17,24,39,0.8);
border-bottom:1px solid rgba(255,215,0,0.15);
box-shadow:0 0 20px rgba(255,215,0,0.08);
}

.header h2{
margin:0;
color:#ffd84d;
text-shadow:0 0 15px #ffd84d;
animation:pulseText 2s infinite alternate;
}

@keyframes pulseText{
from{filter:brightness(1);}
to{filter:brightness(1.4);}
}

/* CONTAINER */
.container{
max-width:500px;
margin:20px auto;
padding:15px;
}

/* CARD */
.card{
background:rgba(11,18,32,0.92);
border:1px solid rgba(255,215,0,0.15);
border-radius:14px;
padding:20px;
box-shadow:
0 0 25px rgba(255,215,0,0.06),
inset 0 0 15px rgba(255,215,0,0.03);
animation:cardGlow 4s infinite alternate;
transition:0.3s;
}

@keyframes cardGlow{
from{box-shadow:0 0 20px rgba(255,215,0,0.05);}
to{box-shadow:0 0 35px rgba(255,215,0,0.15);}
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 0 40px rgba(255,215,0,0.2);
}

/* TITLE */
.card h3{
color:#ffd84d;
margin-top:0;
text-shadow:0 0 10px #ffd84d;
}

/* NOTE */
.note{
font-size:13px;
opacity:0.75;
margin-bottom:15px;
}

/* INPUTS */
input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:1px solid rgba(255,215,0,0.15);
background:#0f172a;
color:white;
transition:0.3s;
}

input:focus{
outline:none;
border:1px solid #ffd84d;
box-shadow:0 0 15px rgba(255,215,0,0.4);
}

/* BUTTON */
button{
width:100%;
padding:13px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

/* GOLD BUTTON */
button{
background:linear-gradient(90deg,#ffd84d,#ffcc00,#fff2a6);
color:black;
box-shadow:0 0 20px rgba(255,215,0,0.4);
}

button:hover{
transform:scale(1.04);
box-shadow:0 0 35px rgba(255,215,0,0.8);
}

/* MESSAGE */
.msg{
margin-top:10px;
font-size:13px;
}

/* FOOTER */
.footer{
text-align:center;
font-size:12px;
opacity:0.5;
margin-top:20px;
}

/* ✨ FLOATING PARTICLES */
.particle{
position:fixed;
width:5px;
height:5px;
background:rgba(255,215,0,0.6);
border-radius:50%;
animation:rise 6s linear infinite;
opacity:0.5;
}

@keyframes rise{
from{transform:translateY(100vh) scale(0);}
to{transform:translateY(-10vh) scale(1.2);}
}
</style>
</head>

<body>

<div class="header">
<h2>🐭 CRYPTOMICE</h2>
</div>

<div class="container">

<div class="card">

<h3>Create Account</h3>

<p class="note">
Only approved users can create an account.
</p>

<input id="email" placeholder="Enter approved email">
<input id="password" type="password" placeholder="Create password">

<button id="signupBtn">Create Account</button>

<p id="msg" class="msg"></p>

</div>

<div class="footer">
Secure account creation • Referral system active
</div>

</div>

<!-- ✨ FLOATING GOLD PARTICLES -->
<script>
for(let i=0;i<18;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(p);
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  collection,
  addDoc,
  increment
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ref = localStorage.getItem("referrer");

document.getElementById("signupBtn").addEventListener("click", async () => {

const email = document.getElementById("email").value.trim().toLowerCase();
const password = document.getElementById("password").value.trim();
const msg = document.getElementById("msg");

if (!email || !password) {
  msg.innerText = "Fill all fields";
  msg.style.color = "red";
  return;
}

try {

const userCred = await createUserWithEmailAndPassword(auth,email,password);
const uid = userCred.user.uid;

/* CREATE USER */
await setDoc(doc(db,"users",uid),{
email,
referrals:0,
earnings:0,
createdAt:new Date()
});

/* REFERRAL SYSTEM */
if (ref) {
  await addDoc(collection(db,"referrals"),{
    referrerId: ref,
    newUserId: uid,
    email,
    createdAt: new Date(),
    credited: true
  });

  await setDoc(doc(db,"users",ref),{
    referrals: increment(1),
    earnings: increment(1)
  }, { merge:true });

  localStorage.removeItem("referrer");
}

msg.style.color="#ffd84d";
msg.innerText="Account created";

setTimeout(()=>{
window.location.href="dashboard.html";
},1000);

}catch(e){
msg.style.color="red";
msg.innerText=e.message;
}

});
</script>

</body>
</html>
