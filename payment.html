<!DOCTYPE html>
<html>
<head>
  <title>Access Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Access Portal</h2>

<p style="color:red;">
Account requires $2 Litecoin activation.
</p>

<hr>

<h3>1. Activate Account</h3>

<p>Send <b>$2 LTC</b> to:</p>

<p style="background:white;padding:10px;border:1px solid #ccc;">
ltc1q6e2ad703p0sx5pe2hz8qrqylnp05vy5wkxc4u5
</p>

<input id="email" placeholder="Enter email"
style="padding:10px;width:100%;margin:5px 0;">

<input id="txid" placeholder="Enter TXID"
style="padding:10px;width:100%;margin:5px 0;">

<button id="submitBtn" style="padding:10px;width:100%;">
Submit Payment
</button>

<p id="msg"></p>

<hr>

<h3>2. Already Approved?</h3>

<button onclick="window.location.href='signup.html'"
style="padding:10px;width:100%;background:#0a66c2;color:white;">
Go to Sign Up
</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("submitBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value.trim();
  const txid = document.getElementById("txid").value.trim();
  const msg = document.getElementById("msg");

  if(!email || !txid){
    msg.innerText = "Fill all fields";
    return;
  }

  // SAVE PAYMENT REQUEST
  await setDoc(doc(db,"paymentRequests", email), {
    email,
    txid,
    status: "pending",
    createdAt: new Date()
  });

  msg.style.color = "green";
  msg.innerText = "Payment submitted. Wait for approval (up to 24h).";

});

</script>

</body>
</html>
