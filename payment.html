<!DOCTYPE html>
<html>
<head>
<title>Cryptomice Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ✅ FIX: prevents boxes from overflowing */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, sans-serif;
background:#050812;
color:white;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%, rgba(255,215,0,0.18), transparent 40%),
radial-gradient(circle at 80% 40%, rgba(255,215,0,0.10), transparent 45%),
radial-gradient(circle at 50% 80%, rgba(255,255,255,0.06), transparent 50%);
animation:floatGlow 8s infinite alternate ease-in-out;
pointer-events:none;
z-index:0;
}

@keyframes floatGlow{
0%{transform:scale(1);}
100%{transform:scale(1.15);}
}

*{position:relative;z-index:1;}

.header{
padding:15px;
text-align:center;
background:rgba(17,24,39,0.8);
border-bottom:1px solid rgba(255,215,0,0.15);
}

.header h2{
margin:0;
color:#ffd84d;
text-shadow:0 0 15px #ffd84d;
}

.container{
max-width:500px;
margin:20px auto;
padding:15px;
padding-bottom:60px;
}

.card{
background:rgba(11,18,32,0.78);
border:1px solid rgba(255,215,0,0.10);
border-radius:14px;
padding:15px;
margin-bottom:20px;
box-shadow:inset 0 0 25px rgba(0,0,0,0.35);
backdrop-filter:blur(5px);
}

/* ===== INPUT FIXED ===== */
input{
width:100%;
padding:13px;
margin:8px 0;
border-radius:10px;
border:1px solid rgba(255,215,0,0.18);
background:rgba(15,23,42,0.9);
color:white;
font-size:14px;
transition:all 0.25s ease;
box-shadow:inset 0 0 10px rgba(0,0,0,0.4);
}

input::placeholder{
color:rgba(255,255,255,0.4);
}

input:focus{
outline:none;
border-color:#ffd84d;
box-shadow:
0 0 10px rgba(255,215,0,0.35),
inset 0 0 12px rgba(255,215,0,0.08);
}

/* ===== BUTTONS ===== */
button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.primary{
background:linear-gradient(90deg,#ffd84d,#ffcc00);
color:black;
}

.secondary{
background:#1f2937;
color:white;
}

/* ===== ADDRESS BOX ===== */
.address{
background:#0f172a;
padding:10px;
border-radius:8px;
border:1px solid rgba(255,215,0,0.15);
font-weight:bold;
word-break:break-all;
}

/* ===== MESSAGE ===== */
.msg{
font-size:13px;
margin-top:8px;
}

/* ===== FOOTER ===== */
.footer{
text-align:center;
padding:15px;
margin-top:30px;
border-top:1px solid rgba(255,215,0,0.15);
font-size:13px;
}

.footer a{
color:#ffd84d;
text-decoration:none;
margin:0 5px;
}

.footer a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="header">
<h2>🐭 CRYPTOMICE</h2>
</div>

<div class="container">

<div class="card">
<h3>1. Activate Access</h3>

<p>Send <b>$2 Litecoin (LTC)</b> to platform address:</p>

<div class="address">
ltc1q6e2ad703p0sx5pe2hz8qrqylnp05vy5wkxc4u5
</div>

<input id="email" placeholder="Enter email">
<input id="txid" placeholder="Enter TXID">

<button class="primary">Submit Payment</button>

<p class="msg" id="payMsg"></p>
</div>

<div class="card">
<h3>2. Member Login</h3>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button class="secondary">Login</button>

<p class="msg" id="loginMsg"></p>
</div>

<div class="card">
<h3>3. Create Account</h3>

<p>If approved, continue to signup.</p>

<button class="primary"
onclick="window.location.href='https://cryptomice.github.io/cryptomice/signup.html'">
GO TO SIGN UP
</button>

</div>

<div class="footer">
<a href="about.html">About</a> |
<a href="terms.html">Terms</a> |
<a href="privacy.html">Privacy</a> |
<a href="disclaimer.html">Disclaimer</a> |
<a href="contact.html">Contact</a>
</div>

</div>

</body>
</html>
