<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* SAFE INIT (prevents white screen crash) */
window.addEventListener("DOMContentLoaded", () => {

  try {

    const params = new URLSearchParams(window.location.search);
    const ref = params.get("ref");

    if (ref && !ref.includes("http")) {
      sessionStorage.setItem("referrer", ref);
      localStorage.setItem("referrer", ref);
    }

    const payBtn = document.getElementById("payBtn");

    if (payBtn) {
      payBtn.addEventListener("click", async () => {

        const emailEl = document.getElementById("email");
        const txidEl = document.getElementById("txid");
        const msg = document.getElementById("payMsg");

        if (!emailEl || !txidEl || !msg) return;

        const email = emailEl.value.trim().toLowerCase();
        const txid = txidEl.value.trim();

        if (!email || !txid) {
          msg.style.color = "red";
          msg.innerText = "Fill all fields";
          return;
        }

        const referrer =
          sessionStorage.getItem("referrer") ||
          localStorage.getItem("referrer") ||
          null;

        await setDoc(doc(db, "payments", txid), {
          email,
          txid,
          referrer,
          status: "pending",
          createdAt: new Date()
        });

        msg.style.color = "green";
        msg.innerText = "Payment submitted";

      });
    }

    const loginBtn = document.getElementById("loginBtn");

    if (loginBtn) {
      loginBtn.addEventListener("click", async () => {

        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;
        const msg = document.getElementById("loginMsg");

        try {
          await signInWithEmailAndPassword(auth, email, password);
          window.location.href = "dashboard.html";
        } catch (e) {
          msg.innerText = e.message;
        }

      });
    }

  } catch (err) {
    console.error("Page init error:", err);
  }

});

          </script>
