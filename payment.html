<!DOCTYPE html>
<html>
<head>
  <title>Payment Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Account Activation Payment</h2>

<p style="color:red;">
Send $2 in Litecoin to unlock account creation (review up to 24 hours)
</p>

<hr>

<h3>Step 1: Send Payment</h3>

<p><b>Litecoin Address:</b></p>
<p style="background:#fff;padding:10px;border:1px solid #ddd;">
YOUR_LITECOIN_ADDRESS_HERE
</p>

<hr>

<h3>Step 2: Submit Payment Proof</h3>

<input id="email" type="email" placeholder="Enter your email"
style="padding:10px;width:100%;margin:5px 0;">

<input id="txid" type="text" placeholder="Enter Litecoin TXID"
style="padding:10px;width:100%;margin:5px 0;">

<button id="submitBtn" style="padding:10px;width:100%;">
Submit Payment
</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

document.getElementById("submitBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value.trim();
  const txid = document.getElementById("txid").value.trim();
  const msg = document.getElementById("msg");

  if (!email || !txid) {
    msg.innerText = "Fill all fields";
    return;
  }

  try {

    // CRITICAL FIX:
    // Use TXID as document ID so admin sees everything correctly
    await setDoc(doc(db, "payments", txid), {
      email: email,
      txid: txid,
      coin: "LTC",
      amount: 2,
      status: "pending",
      createdAt: new Date()
    });

    msg.style.color = "green";
    msg.innerText = "Payment submitted successfully. Wait up to 24 hours.";

  } catch (error) {
    msg.innerText = error.message;
  }

});
</script>

</body>
  </html>
