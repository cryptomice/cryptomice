<!DOCTYPE html>
<html>
<head>
<title>Cryptomice Access</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#070b14;
color:white;
}

/* HEADER */
.header{
padding:15px;
text-align:center;
background:#111827;
border-bottom:1px solid #1f2937;
}

.header h2{
margin:0;
color:#ffd700;
}

/* CONTAINER */
.container{
max-width:500px;
margin:20px auto;
padding:15px;
}

/* CARD */
.card{
background:#0b1220;
border:1px solid #1f2937;
border-radius:12px;
padding:15px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

/* TITLES */
.card h3{
margin-top:0;
color:#ffd700;
font-size:16px;
}

/* WARNING */
.notice{
background:rgba(255,0,0,0.1);
border-left:4px solid red;
padding:10px;
margin-bottom:15px;
font-size:13px;
}

/* INPUTS */
input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:1px solid #1f2937;
background:#111827;
color:white;
}

/* BUTTONS */
button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.primary{
background:linear-gradient(90deg,#ffd700,#ffcc00);
color:black;
}

.secondary{
background:#1f2937;
color:white;
}

/* ADDRESS BOX */
.address{
background:#111827;
padding:10px;
border-radius:8px;
border:1px solid #1f2937;
font-weight:bold;
word-break:break-all;
}

/* SUCCESS / ERROR */
.msg{
font-size:13px;
margin-top:8px;
}

/* SIGNUP BOX */
.signup{
background:#0f3d1f;
padding:15px;
border-radius:10px;
text-align:center;
}

.signup button{
background:white;
color:black;
}
</style>
</head>

<body>

<div class="header">
<h2>🐭 CRYPTOMICE</h2>
</div>

<div class="container">

<div class="notice">
⚠ Account access requires a one-time activation payment.
</div>

<!-- PAYMENT -->
<div class="card">
<h3>1. Activate Access</h3>

<p>Send <b>$2 Litecoin (LTC)</b> to:</p>

<div class="address">
ltc1q6e2ad703p0sx5pe2hz8qrqylnp05vy5wkxc4u5
</div>

<input id="email" placeholder="Enter email">
<input id="txid" placeholder="Enter TXID">

<button id="payBtn" class="primary">Submit Payment Proof</button>

<p id="payMsg" class="msg"></p>
</div>

<!-- LOGIN -->
<div class="card">
<h3>2. Member Login</h3>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<button id="loginBtn" class="secondary">Login</button>

<p id="loginMsg" class="msg"></p>
</div>

<!-- SIGNUP -->
<div class="card signup">
<h3>3. Create Account</h3>

<p>If your payment is approved, continue to account creation.</p>

<button onclick="window.location.href='signup.html'">
GO TO SIGN UP
</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* SAVE REF */
const params = new URLSearchParams(window.location.search);
const ref = params.get("ref");
if (ref) localStorage.setItem("referrer", ref);

/* PAYMENT */
document.getElementById("payBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value.trim().toLowerCase();
  const txid = document.getElementById("txid").value.trim();
  const msg = document.getElementById("payMsg");

  if (!email || !txid) {
    msg.innerText = "Fill all fields";
    msg.style.color = "red";
    return;
  }

  const referrer = localStorage.getItem("referrer") || null;

  await setDoc(doc(db, "payments", txid), {
    email,
    txid,
    referrer,
    status: "pending",
    createdAt: new Date()
  });

  msg.style.color = "#00ff99";
  msg.innerText = "Payment submitted";
});

/* LOGIN */
document.getElementById("loginBtn").addEventListener("click", async () => {
  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  try {
    await signInWithEmailAndPassword(auth, email, password);
    window.location.href = "dashboard.html";
  } catch (e) {
    document.getElementById("loginMsg").innerText = e.message;
  }
});
</script>

</body>
</html>
