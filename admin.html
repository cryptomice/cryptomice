<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Admin Dashboard</h2>

<h3>Payment Requests</h3>
<div id="payments">Loading...</div>

<hr>

<h3>Withdrawal Requests</h3>
<div id="withdrawals">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  updateDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// -------- LOAD PAYMENTS --------
async function loadPayments(){

  const container = document.getElementById("payments");
  container.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "payments"));

  querySnapshot.forEach((docSnap) => {

    const data = docSnap.data();

    if(data.status !== "pending") return;

    const div = document.createElement("div");
    div.style.background = "white";
    div.style.padding = "10px";
    div.style.marginBottom = "10px";

    div.innerHTML = `
      <p><b>Email:</b> ${data.email}</p>
      <p><b>TXID:</b> ${data.txid}</p>
      <button onclick="approvePayment('${docSnap.id}','${data.email}')">
      Approve
      </button>
    `;

    container.appendChild(div);

  });

}

window.approvePayment = async (txid, email) => {

  await updateDoc(doc(db,"payments",txid),{
    status:"approved"
  });

  // create approved email record
  await setDoc(doc(db,"approvedEmails",email),{
    email:email,
    approved:true
  });

  alert("Payment Approved");
  loadPayments();
};


// -------- LOAD WITHDRAWALS --------
async function loadWithdrawals(){

  const container = document.getElementById("withdrawals");
  container.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "withdrawals"));

  querySnapshot.forEach((docSnap) => {

    const data = docSnap.data();

    if(data.status !== "pending") return;

    const div = document.createElement("div");
    div.style.background = "white";
    div.style.padding = "10px";
    div.style.marginBottom = "10px";

    div.innerHTML = `
      <p><b>Email:</b> ${data.email}</p>
      <p><b>Amount:</b> $${data.amount}</p>
      <p><b>Wallet:</b> ${data.wallet}</p>
      <button onclick="approveWithdraw('${docSnap.id}')">
      Mark Paid
      </button>
    `;

    container.appendChild(div);

  });

}

window.approveWithdraw = async (id) => {

  await updateDoc(doc(db,"withdrawals",id),{
    status:"paid"
  });

  alert("Marked as Paid");
  loadWithdrawals();
};


// LOAD DATA
loadPayments();
loadWithdrawals();

</script>

</body>
  </html>
