<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Admin Dashboard</h2>

<hr>

<h3>Payment Requests</h3>
<div id="payments"></div>

<hr>

<h3>Withdrawal Requests</h3>
<div id="withdrawals"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// ---------------- LOAD PAYMENTS ----------------
async function loadPayments(){

  const container = document.getElementById("payments");
  container.innerHTML = "Loading...";

  const snap = await getDocs(collection(db,"payments"));

  container.innerHTML = "";

  snap.forEach(docSnap => {

    const data = docSnap.data();
    const id = docSnap.id;

    const div = document.createElement("div");

    div.style.background="white";
    div.style.padding="15px";
    div.style.marginBottom="10px";
    div.style.border="1px solid #ccc";

    div.innerHTML = `
      <p><b>Email:</b> ${data.email}</p>
      <p><b>TXID:</b> ${data.txid}</p>
      <p><b>Status:</b> ${data.status}</p>

      <button onclick="approvePayment('${id}')"
      style="background:green;color:white;padding:8px;border:none;">
      Approve
      </button>

      <button onclick="deletePayment('${id}')"
      style="background:red;color:white;padding:8px;border:none;">
      Delete
      </button>
    `;

    container.appendChild(div);

  });

}


// ---------------- LOAD WITHDRAWALS ----------------
async function loadWithdrawals(){

  const container = document.getElementById("withdrawals");
  container.innerHTML = "Loading...";

  const snap = await getDocs(collection(db,"withdrawals"));

  container.innerHTML = "";

  snap.forEach(docSnap => {

    const data = docSnap.data();
    const id = docSnap.id;

    const wallet =
      data.wallet ||
      data.walletAddress ||
      "No wallet provided";

    const div = document.createElement("div");

    div.style.background="white";
    div.style.padding="15px";
    div.style.marginBottom="10px";
    div.style.border="1px solid #ccc";

    div.innerHTML = `
      <p><b>Email:</b> ${data.email || "N/A"}</p>
      <p><b>Amount:</b> $${data.amount}</p>
      <p><b>Wallet:</b> ${wallet}</p>

      <button onclick="markPaid('${id}')"
      style="background:green;color:white;padding:8px;border:none;">
      Mark Paid
      </button>

      <button onclick="deleteWithdraw('${id}')"
      style="background:red;color:white;padding:8px;border:none;">
      Delete
      </button>
    `;

    container.appendChild(div);

  });

}


// ---------------- APPROVE PAYMENT ----------------
window.approvePayment = async (id) => {

  await updateDoc(doc(db,"payments",id),{
    status:"approved"
  });

  loadPayments();
};


// ---------------- DELETE PAYMENT ----------------
window.deletePayment = async (id) => {

  await deleteDoc(doc(db,"payments",id));
  loadPayments();
};


// ---------------- MARK PAID ----------------
window.markPaid = async (id) => {

  await updateDoc(doc(db,"withdrawals",id),{
    status:"paid"
  });

  loadWithdrawals();
};


// ---------------- DELETE WITHDRAW ----------------
window.deleteWithdraw = async (id) => {

  await deleteDoc(doc(db,"withdrawals",id));
  loadWithdrawals();
};


// INITIAL LOAD
loadPayments();
loadWithdrawals();

</script>

</body>
</html>
