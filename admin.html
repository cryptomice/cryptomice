<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Admin Dashboard</h2>

<p id="status">Checking access...</p>

<hr>

<h3>Payment Requests</h3>
<div id="payments">Loading...</div>

<hr>

<h3>Users</h3>
<div id="users">Loading users...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  getDoc,
  collection,
  getDocs,
  updateDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const status = document.getElementById("status");
const paymentsDiv = document.getElementById("payments");
const usersDiv = document.getElementById("users");

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const adminSnap = await getDoc(doc(db, "users", user.uid));

  if (!adminSnap.exists() || adminSnap.data().role !== "admin") {
    status.innerText = "Access Denied";
    return;
  }

  status.innerText = "Admin Access Granted";

  loadPayments();
  loadUsers();
});

// LOAD PAYMENTS
async function loadPayments() {

  const snap = await getDocs(collection(db, "payments"));
  paymentsDiv.innerHTML = "";

  if (snap.empty) {
    paymentsDiv.innerHTML = "No payment requests";
    return;
  }

  snap.forEach((p) => {
    const d = p.data();

    const box = document.createElement("div");
    box.style.background = "white";
    box.style.padding = "10px";
    box.style.margin = "10px 0";

    let actions = "";

    if (d.status === "pending") {
      actions = `
        <button onclick="approvePayment('${p.id}')">Approve</button>
        <button onclick="rejectPayment('${p.id}')">Reject</button>
      `;
    } else {
      actions = `<b>Status:</b> ${d.status}`;
    }

    box.innerHTML = `
      <b>Email:</b> ${d.email} <br>
      <b>TXID:</b> ${p.id} <br>
      <b>Coin:</b> ${d.coin} <br>
      <b>Status:</b> ${d.status} <br><br>
      ${actions}
    `;

    paymentsDiv.appendChild(box);
  });
}

// LOAD USERS
async function loadUsers() {

  const snap = await getDocs(collection(db, "users"));
  usersDiv.innerHTML = "";

  snap.forEach((u) => {
    const d = u.data();

    const box = document.createElement("div");
    box.style.background = "white";
    box.style.padding = "10px";
    box.style.margin = "10px 0";

    box.innerHTML = `
      <b>Email:</b> ${d.email || "N/A"} <br>
      <b>Referrals:</b> ${d.referrals || 0} <br>
      <b>Earnings:</b> $${d.earnings || 0}
    `;

    usersDiv.appendChild(box);
  });
}

// APPROVE
window.approvePayment = async function(id) {

  await updateDoc(doc(db, "payments", id), {
    status: "approved"
  });

  alert("Payment approved");
  location.reload();
};

// REJECT
window.rejectPayment = async function(id) {

  await updateDoc(doc(db, "payments", id), {
    status: "rejected"
  });

  alert("Payment rejected");
  location.reload();
};

</script>

</body>
</html>
