<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Admin Dashboard</h2>

<h3>Payment Requests</h3>
<div id="payments">Loading...</div>

<hr>

<h3>Approved Emails</h3>
<div id="approved">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  setDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= LOAD PAYMENTS =================
async function loadPayments() {

  const container = document.getElementById("payments");
  container.innerHTML = "";

  const snap = await getDocs(collection(db, "paymentRequests"));

  if (snap.empty) {
    container.innerHTML = "<p>No payment requests</p>";
    return;
  }

  snap.forEach(docSnap => {

    const d = docSnap.data();

    const div = document.createElement("div");
    div.style.background = "white";
    div.style.padding = "10px";
    div.style.marginBottom = "10px";

    div.innerHTML = `
      <p><b>Email:</b> ${d.email}</p>
      <p><b>TXID:</b> ${d.txid}</p>

      <button onclick="approve('${d.email}')">
        Approve
      </button>

      <button style="background:red;color:white;margin-left:10px;"
        onclick="remove('${d.email}')">
        Delete
      </button>
    `;

    container.appendChild(div);

  });
}

// ================= APPROVE PAYMENT =================
window.approve = async (email) => {

  // mark email as approved (SIGNUP GATE)
  await setDoc(doc(db, "approvedEmails", email), {
    email,
    approved: true,
    createdAt: new Date()
  });

  // delete payment request
  await deleteDoc(doc(db, "paymentRequests", email));

  alert("Approved");
  loadPayments();
};

// ================= DELETE PAYMENT =================
window.remove = async (email) => {

  await deleteDoc(doc(db, "paymentRequests", email));

  alert("Deleted");
  loadPayments();
};

// ================= LOAD APPROVED EMAILS =================
async function loadApproved() {

  const container = document.getElementById("approved");
  container.innerHTML = "";

  const snap = await getDocs(collection(db, "approvedEmails"));

  if (snap.empty) {
    container.innerHTML = "<p>No approved users</p>";
    return;
  }

  snap.forEach(docSnap => {

    const d = docSnap.data();

    const div = document.createElement("div");
    div.style.background = "#dff0d8";
    div.style.padding = "10px";
    div.style.marginBottom = "10px";

    div.innerHTML = `
      <p><b>Email:</b> ${d.email}</p>
    `;

    container.appendChild(div);

  });
}

// INIT
loadPayments();
loadApproved();

</script>

</body>
</html>
