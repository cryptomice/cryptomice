<!DOCTYPE html>
<html>
<head>
<title>Cryptomice Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#03060c;
color:white;
overflow-x:hidden;
}

/* ✨ GOLD BACKGROUND */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%, rgba(255,215,0,0.15), transparent 40%),
radial-gradient(circle at 80% 60%, rgba(255,215,0,0.08), transparent 50%);
animation:move 8s infinite alternate;
z-index:0;
}

@keyframes move{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

*{position:relative;z-index:1;}

/* HEADER */
.header{
text-align:center;
padding:15px;
border-bottom:1px solid rgba(255,215,0,0.2);
}

.header h2{
color:#ffd84d;
text-shadow:0 0 15px #ffd84d;
}

/* SECTION TITLE */
.section-title{
margin:20px 15px 10px;
color:#ffd84d;
text-shadow:0 0 10px #ffd84d;
}

/* CARD */
.card{
margin:15px;
padding:15px;
border-radius:12px;
background:#0b1220;
border:1px solid rgba(255,215,0,0.2);
box-shadow:0 0 20px rgba(255,215,0,0.08);
}

/* ITEM BOX */
.item{
background:#0f172a;
padding:12px;
border-radius:10px;
margin-bottom:10px;
border:1px solid rgba(255,215,0,0.15);
}

/* TEXT */
.item p{
margin:4px 0;
font-size:13px;
}

/* BUTTONS */
button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
margin-right:5px;
margin-top:5px;
font-weight:bold;
}

/* ACTION BUTTONS */
.approve{
background:linear-gradient(90deg,#00ff88,#00cc66);
color:black;
box-shadow:0 0 10px rgba(0,255,120,0.5);
}

.delete{
background:linear-gradient(90deg,#ff4d4d,#cc0000);
color:white;
box-shadow:0 0 10px rgba(255,0,0,0.5);
}

.paid{
background:linear-gradient(90deg,#ffd84d,#ffcc00);
color:black;
box-shadow:0 0 10px rgba(255,215,0,0.5);
}

/* STATUS */
.status{
font-size:12px;
opacity:0.7;
}

/* EMPTY */
.empty{
opacity:0.6;
font-size:13px;
padding:10px;
}
</style>
</head>

<body>

<div class="header">
<h2>🐭 CRYPTOMICE ADMIN</h2>
</div>

<h3 class="section-title">💰 Payment Requests</h3>
<div id="payments" class="card"></div>

<h3 class="section-title">💸 Withdrawal Requests</h3>
<div id="withdrawals" class="card"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
updateDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
authDomain: "cryptomice-635eb.firebaseapp.com",
projectId: "cryptomice-635eb",
storageBucket: "cryptomice-635eb.firebasestorage.app",
messagingSenderId: "831908710470",
appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* ---------------- PAYMENTS ---------------- */
async function loadPayments(){

const container = document.getElementById("payments");
container.innerHTML = "";

const snap = await getDocs(collection(db,"payments"));

if(snap.empty){
container.innerHTML = "<div class='empty'>No payment requests</div>";
return;
}

snap.forEach(docSnap=>{

const data = docSnap.data();
const id = docSnap.id;

const div = document.createElement("div");
div.className="item";

div.innerHTML = `
<p><b>Email:</b> ${data.email}</p>
<p><b>TXID:</b> ${data.txid}</p>
<p class="status">Status: ${data.status}</p>

<button class="approve" onclick="approvePayment('${id}')">Approve</button>
<button class="delete" onclick="deletePayment('${id}')">Delete</button>
`;

container.appendChild(div);

});
}


/* ---------------- WITHDRAWALS ---------------- */
async function loadWithdrawals(){

const container = document.getElementById("withdrawals");
container.innerHTML = "";

const snap = await getDocs(collection(db,"withdrawals"));

if(snap.empty){
container.innerHTML = "<div class='empty'>No withdrawals</div>";
return;
}

snap.forEach(docSnap=>{

const data = docSnap.data();
const id = docSnap.id;

const wallet =
data.wallet ||
data.walletAddress ||
"No wallet provided";

const div = document.createElement("div");
div.className="item";

div.innerHTML = `
<p><b>Email:</b> ${data.email || "N/A"}</p>
<p><b>Amount:</b> $${data.amount}</p>
<p><b>Wallet:</b> ${wallet}</p>

<button class="paid" onclick="markPaid('${id}')">Mark Paid</button>
<button class="delete" onclick="deleteWithdraw('${id}')">Delete</button>
`;

container.appendChild(div);

});
}


/* ---------------- ACTIONS ---------------- */
window.approvePayment = async (id)=>{
await updateDoc(doc(db,"payments",id),{status:"approved"});
loadPayments();
};

window.deletePayment = async (id)=>{
await deleteDoc(doc(db,"payments",id));
loadPayments();
};

window.markPaid = async (id)=>{
await updateDoc(doc(db,"withdrawals",id),{status:"paid"});
loadWithdrawals();
};

window.deleteWithdraw = async (id)=>{
await deleteDoc(doc(db,"withdrawals",id));
loadWithdrawals();
};


/* INIT */
loadPayments();
loadWithdrawals();

</script>

</body>
</html>
