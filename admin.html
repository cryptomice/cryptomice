<!DOCTYPE html>
<html>
<head>
  <title>Admin Withdrawals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Withdrawal Requests</h2>

<div id="withdrawals"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  updateDoc,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadWithdrawals() {

  const container = document.getElementById("withdrawals");
  container.innerHTML = "Loading...";

  const querySnapshot = await getDocs(collection(db, "withdrawals"));

  container.innerHTML = "";

  querySnapshot.forEach((docSnap) => {

    const data = docSnap.data();
    const id = docSnap.id;

    // FIX: support both wallet & walletAddress
    const wallet =
      data.wallet ||
      data.walletAddress ||
      "No wallet provided";

    const div = document.createElement("div");

    div.style.background = "white";
    div.style.padding = "15px";
    div.style.marginBottom = "15px";
    div.style.border = "1px solid #ccc";

    div.innerHTML = `
      <p><b>Email:</b> ${data.email || "N/A"}</p>
      <p><b>Amount:</b> $${data.amount || 0}</p>
      <p><b>Wallet:</b> ${wallet}</p>

      <button onclick="markPaid('${id}')"
      style="background:green;color:white;padding:8px;border:none;">
      Mark Paid
      </button>

      <button onclick="deleteReq('${id}')"
      style="background:red;color:white;padding:8px;border:none;">
      Delete
      </button>
    `;

    container.appendChild(div);

  });

}

window.markPaid = async (id) => {

  await updateDoc(doc(db, "withdrawals", id), {
    status: "paid"
  });

  loadWithdrawals();
};

window.deleteReq = async (id) => {

  await deleteDoc(doc(db, "withdrawals", id));
  loadWithdrawals();
};

loadWithdrawals();

</script>

</body>
</html>
