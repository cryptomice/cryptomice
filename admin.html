<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Admin Dashboard</h2>

<p id="status">Checking access...</p>
<p id="debug">Debug: initializing...</p>

<hr>

<h3>Users</h3>
<div id="users">Loading users...</div>

<hr>

<h3>Withdrawal Requests</h3>
<div id="withdrawals">Loading withdrawals...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const status = document.getElementById("status");
const debug = document.getElementById("debug");
const usersDiv = document.getElementById("users");
const withdrawalsDiv = document.getElementById("withdrawals");

onAuthStateChanged(auth, async (user) => {

  if (!user) {
    status.innerText = "Not logged in";
    window.location.href = "login.html";
    return;
  }

  debug.innerText = "User detected: " + user.email;

  try {
    const userSnap = await getDoc(doc(db, "users", user.uid));

    if (!userSnap.exists()) {
      status.innerText = "User document missing in Firestore";
      return;
    }

    if (userSnap.data().role !== "admin") {
      status.innerText = "Access Denied (Not Admin)";
      return;
    }

    status.innerText = "Admin Access Granted";
    debug.innerText = "Loading users...";

    // LOAD USERS
    const allUsers = await getDocs(collection(db, "users"));
    usersDiv.innerHTML = "";

    allUsers.forEach((u) => {
      const data = u.data();

      const div = document.createElement("div");
      div.style.background = "white";
      div.style.padding = "10px";
      div.style.margin = "10px 0";

      div.innerHTML = `
        <b>Email:</b> ${data.email || "N/A"} <br>
        <b>Referrals:</b> ${data.referrals || 0} <br>
        <b>Earnings:</b> $${data.earnings || 0}
      `;

      usersDiv.appendChild(div);
    });

    // LOAD WITHDRAWALS
    debug.innerText = "Loading withdrawals...";
    const wdSnap = await getDocs(collection(db, "withdrawals"));
    withdrawalsDiv.innerHTML = "";

    if (wdSnap.empty) {
      withdrawalsDiv.innerHTML = "<p>No withdrawal requests</p>";
      return;
    }

    wdSnap.forEach((w) => {
      const d = w.data();

      const box = document.createElement("div");
      box.style.background = "white";
      box.style.padding = "10px";
      box.style.margin = "10px 0";

      box.innerHTML = `
        <b>Email:</b> ${d.email || "N/A"} <br>
        <b>Amount:</b> $${d.amount || 0} <br>
        <b>Wallet:</b> ${d.cryptoAddress || "N/A"} <br>
        <b>Status:</b> ${d.status || "pending"}
      `;

      withdrawalsDiv.appendChild(box);
    });

  } catch (error) {
    status.innerText = "Error loading admin panel";
    debug.innerText = error.message;
  }

});
</script>

</body>
</html>
