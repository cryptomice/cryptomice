<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Admin Dashboard</h2>

<h3>Payment Requests</h3>
<div id="payments">Loading...</div>

<hr>

<h3>Withdrawal Requests</h3>
<div id="withdrawals">Loading...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  setDoc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ================= PAYMENTS =================
async function loadPayments(){

  const container = document.getElementById("payments");
  container.innerHTML = "";

  const snap = await getDocs(collection(db,"payments"));

  let found = false;

  snap.forEach(docSnap => {

    const d = docSnap.data();

    if(d.status !== "pending") return;

    found = true;

    const div = document.createElement("div");
    div.style.background = "white";
    div.style.padding = "10px";
    div.style.marginBottom = "10px";

    div.innerHTML = `
      <p><b>Email:</b> ${d.email}</p>
      <p><b>TXID:</b> ${d.txid}</p>

      <button onclick="approvePayment('${docSnap.id}','${d.email}')">
        Approve
      </button>

      <button style="background:red;color:white;margin-left:10px;"
        onclick="deletePayment('${docSnap.id}')">
        Delete
      </button>
    `;

    container.appendChild(div);

  });

  if(!found){
    container.innerHTML = "<p>No pending payments</p>";
  }
}

window.approvePayment = async (id,email) => {

  // allow signup
  await setDoc(doc(db,"approvedEmails",email),{
    email,
    approved:true,
    createdAt: new Date()
  });

  // DELETE payment record (your requirement)
  await deleteDoc(doc(db,"payments",id));

  alert("Approved and payment deleted");
  loadPayments();
};

window.deletePayment = async (id) => {
  await deleteDoc(doc(db,"payments",id));
  alert("Payment deleted");
  loadPayments();
};


// ================= WITHDRAWALS =================
async function loadWithdrawals(){

  const container = document.getElementById("withdrawals");
  container.innerHTML = "";

  const snap = await getDocs(collection(db,"withdrawals"));

  let found = false;

  snap.forEach(docSnap => {

    const d = docSnap.data();

    if(d.status !== "pending") return;

    found = true;

    const div = document.createElement("div");
    div.style.background = "white";
    div.style.padding = "10px";
    div.style.marginBottom = "10px";

    div.innerHTML = `
      <p><b>Email:</b> ${d.email}</p>
      <p><b>Amount:</b> $${d.amount}</p>
      <p><b>Wallet:</b> ${d.cryptoAddress}</p>

      <button onclick="approveWithdraw('${docSnap.id}')">
        Mark Paid
      </button>

      <button style="background:red;color:white;margin-left:10px;"
        onclick="deleteWithdraw('${docSnap.id}')">
        Delete
      </button>
    `;

    container.appendChild(div);

  });

  if(!found){
    container.innerHTML = "<p>No pending withdrawals</p>";
  }
}

window.approveWithdraw = async (id) => {

  await updateDoc(doc(db,"withdrawals",id),{
    status:"paid"
  });

  alert("Marked as paid");
  loadWithdrawals();
};

window.deleteWithdraw = async (id) => {

  await deleteDoc(doc(db,"withdrawals",id));

  alert("Withdrawal deleted");
  loadWithdrawals();
};


// INIT
loadPayments();
loadWithdrawals();

</script>

</body>
</html>
