<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Dashboard</h2>

<p id="userEmail">Loading...</p>

<hr>

<h3>Your Referral Link</h3>
<p id="refLink">Loading...</p>
<button onclick="copyLink()">Copy Link</button>

<hr>

<h3>Stats</h3>

<p>Referrals: <span id="refCount">0</span></p>
<p>Earnings: $<span id="earnings">0</span></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { getFirestore, doc, getDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUID = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUID = user.uid;

  document.getElementById("userEmail").innerText =
    "Logged in as: " + user.email;

  const refLink =
    "https://cryptomice.github.io/cryptomice/signup.html?ref=" + user.uid;

  document.getElementById("refLink").innerText = refLink;

  const snap = await getDoc(doc(db, "users", user.uid));

  if (snap.exists()) {
    const data = snap.data();

    document.getElementById("refCount").innerText = data.referrals || 0;
    document.getElementById("earnings").innerText = data.earnings || 0;
  }
});

window.copyLink = function () {
  navigator.clipboard.writeText(document.getElementById("refLink").innerText);
  alert("Copied!");
};
</script>

</body>
</html>
