<!DOCTYPE html>
<html>
<head>
<title>Cryptomice Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#03060c;
color:white;
overflow-x:hidden;
}

/* ✨ GOLD BACKGROUND */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%, rgba(255,215,0,0.15), transparent 40%),
radial-gradient(circle at 80% 60%, rgba(255,215,0,0.08), transparent 50%);
animation:move 8s infinite alternate;
z-index:0;
}

@keyframes move{
from{transform:scale(1);}
to{transform:scale(1.2);}
}

*{position:relative;z-index:1;}

/* HEADER */
.header{
text-align:center;
padding:15px;
border-bottom:1px solid rgba(255,215,0,0.2);
}

.header h2{
color:#ffd84d;
text-shadow:0 0 15px #ffd84d;
}

/* CARD */
.card{
margin:15px;
padding:15px;
border-radius:12px;
background:#0b1220;
border:1px solid rgba(255,215,0,0.2);
box-shadow:0 0 20px rgba(255,215,0,0.1);
}

/* BALANCE */
.balance{
font-size:34px;
color:#ffd84d;
text-align:center;
text-shadow:0 0 20px #ffd84d;
}

.small{
font-size:12px;
opacity:0.7;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:1px solid rgba(255,215,0,0.2);
background:#0f172a;
color:white;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

.primary{
background:linear-gradient(90deg,#ffd84d,#ffcc00);
color:black;
box-shadow:0 0 20px rgba(255,215,0,0.5);
}

.secondary{
background:#1f2937;
color:white;
}

.ref-box{
background:#0f172a;
padding:10px;
border-radius:8px;
word-break:break-all;
margin-bottom:10px;
}

.stats{
display:flex;
justify-content:space-between;
text-align:center;
}

.stat h3{
color:#ffd84d;
margin:0;
}

.msg{
font-size:13px;
margin-top:8px;
}
</style>
</head>

<body>

<div class="header">
<h2>🐭 CRYPTOMICE DASHBOARD</h2>
<p id="userEmail">Loading...</p>
</div>

<div class="card">
<div class="small">Available Earnings</div>
<div class="balance">$<span id="earnings">0</span></div>
<div class="small">User ID: ••••••• (hidden)</div>
</div>

<div class="card">
<h3>Your Referral Link</h3>
<div id="refLink" class="ref-box">Loading...</div>
<button class="secondary" onclick="copyLink()">Copy Link</button>
</div>

<div class="card">
<h3>Stats</h3>
<div class="stats">
<div class="stat">
<h3 id="refCount">0</h3>
<p>Referrals</p>
</div>
<div class="stat">
<h3>$1</h3>
<p>Per Signup</p>
</div>
</div>
</div>

<div class="card">
<h3>Withdraw (Litecoin)</h3>

<p class="small">Minimum withdrawal: $1</p>

<input id="withdrawAmount" type="number" placeholder="Enter amount">
<input id="withdrawWallet" placeholder="Enter LTC wallet">

<button id="withdrawBtn" class="primary">Request Withdrawal</button>

<p id="withdrawMsg" class="msg"></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc,
updateDoc,
addDoc,
collection,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
authDomain: "cryptomice-635eb.firebaseapp.com",
projectId: "cryptomice-635eb",
storageBucket: "cryptomice-635eb.firebasestorage.app",
messagingSenderId: "831908710470",
appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUID = null;
let currentUserEmail = null;

/* AUTH */
onAuthStateChanged(auth, async (user) => {

if (!user) {
window.location.href = "https://cryptomice.github.io/cryptomice/payment.html";
return;
}

currentUID = user.uid;
currentUserEmail = user.email;

document.getElementById("userEmail").innerText =
"Logged in as: " + user.email;

/* REF LINK */
document.getElementById("refLink").innerText =
"https://cryptomice.github.io/cryptomice/index.html?ref=" + user.uid;

const snap = await getDoc(doc(db,"users",user.uid));

if(snap.exists()){
const data = snap.data();
document.getElementById("refCount").innerText = data.referrals || 0;
document.getElementById("earnings").innerText = data.earnings || 0;
}

});

/* COPY */
window.copyLink = function(){
navigator.clipboard.writeText(document.getElementById("refLink").innerText);
alert("Copied!");
};

/* WITHDRAW */
document.getElementById("withdrawBtn").addEventListener("click", async () => {

const amount = parseFloat(document.getElementById("withdrawAmount").value);
const wallet = document.getElementById("withdrawWallet").value.trim();
const msg = document.getElementById("withdrawMsg");

try{

msg.innerText="Processing...";

if(!amount || amount<1){
msg.innerText="Minimum $1";
return;
}

if(!wallet){
msg.innerText="Enter wallet";
return;
}

const userRef = doc(db,"users",currentUID);
const snap = await getDoc(userRef);

const data = snap.data();
const earnings = data.earnings || 0;

if(amount>earnings){
msg.innerText="Insufficient balance";
return;
}

const safeEmail = data.email || currentUserEmail || "unknown";

await addDoc(collection(db,"withdrawals"),{
userId: currentUID,
email: safeEmail,
amount: amount,
wallet: wallet,
coin:"LTC",
status:"pending",
createdAt: serverTimestamp()
});

await updateDoc(userRef,{
earnings: earnings - amount
});

document.getElementById("earnings").innerText = earnings - amount;

msg.style.color="lime";
msg.innerText="Withdrawal sent";

}catch(e){
msg.style.color="red";
msg.innerText=e.message;
}

});

</script>

</body>
</html>
