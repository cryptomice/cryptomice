<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Dashboard</h2>

<p id="userEmail">Loading user...</p>

<h3>Your Referral Link</h3>
<p id="refLink">Generating...</p>

<button onclick="copyLink()">Copy Referral Link</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById("userEmail").innerText = "Logged in as: " + user.email;

    // FIXED referral link (IMPORTANT)
    const refLink = window.location.origin + "/cryptomice/signup.html?ref=" + user.uid;

    document.getElementById("refLink").innerText = refLink;
    window.generatedLink = refLink;
  } else {
    window.location.href = "login.html";
  }
});

window.copyLink = function() {
  navigator.clipboard.writeText(window.generatedLink);
  alert("Referral link copied!");
}
</script>

</body>
</html>
