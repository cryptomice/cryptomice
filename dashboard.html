<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>Dashboard</h2>

<p id="userEmail">Loading...</p>

<hr>

<h3>Your Referral Link</h3>
<p id="refLink">Loading...</p>
<button onclick="copyLink()">Copy Link</button>

<hr>

<h3>Stats</h3>

<p>Referrals: <span id="refCount">0</span></p>
<p>Earnings: $<span id="earnings">0</span></p>

<hr>

<h3>Request Withdrawal (Litecoin)</h3>
<p style="color:gray;font-size:13px;">
Withdrawals are paid in Litecoin (LTC). Minimum $1.
</p>

<input id="withdrawAmount" type="number" placeholder="Minimum $1"
style="padding:10px;width:100%;margin:5px 0;">

<input id="withdrawWallet" type="text" 
placeholder="Enter your Litecoin (LTC) wallet address"
style="padding:10px;width:100%;margin:5px 0;">

<button id="withdrawBtn" style="padding:10px;width:100%;">
Request Withdrawal
</button>

<p id="withdrawMsg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import { 
  getFirestore, 
  doc, 
  getDoc, 
  updateDoc,
  collection, 
  addDoc, 
  serverTimestamp 
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUID = null;

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUID = user.uid;

  document.getElementById("userEmail").innerText =
    "Logged in as: " + user.email;

  const refLink =
    "https://cryptomice.github.io/cryptomice/signup.html?ref=" + user.uid;

  document.getElementById("refLink").innerText = refLink;

  const snap = await getDoc(doc(db, "users", user.uid));

  if (snap.exists()) {
    const data = snap.data();

    document.getElementById("refCount").innerText = data.referrals || 0;
    document.getElementById("earnings").innerText = data.earnings || 0;
  }
});

window.copyLink = function () {
  navigator.clipboard.writeText(document.getElementById("refLink").innerText);
  alert("Copied!");
};

document.getElementById("withdrawBtn").addEventListener("click", async () => {

  const amount = parseFloat(document.getElementById("withdrawAmount").value);
  const wallet = document.getElementById("withdrawWallet").value.trim();
  const msg = document.getElementById("withdrawMsg");

  if (!amount || amount <= 0) {
    msg.innerText = "Enter valid amount";
    return;
  }

  if (amount < 1) {
    msg.innerText = "Minimum withdrawal is $1";
    return;
  }

  if (!wallet) {
    msg.innerText = "Enter Litecoin wallet address";
    return;
  }

  try {

    const userRef = doc(db, "users", currentUID);
    const userSnap = await getDoc(userRef);
    const userData = userSnap.data();
    const earnings = userData.earnings || 0;

    if (amount > earnings) {
      msg.innerText = "You cannot withdraw more than your earnings";
      return;
    }

    await addDoc(collection(db, "withdrawals"), {
      userId: currentUID,
      email: userData.email,
      amount: amount,
      cryptoAddress: wallet,
      coin: "LTC",
      status: "pending",
      createdAt: serverTimestamp()
    });

    const newBalance = earnings - amount;

    await updateDoc(userRef, {
      earnings: newBalance
    });

    document.getElementById("earnings").innerText = newBalance;

    document.getElementById("withdrawAmount").value = "";
    document.getElementById("withdrawWallet").value = "";

    msg.innerText = "Withdrawal request sent (Litecoin)";

  } catch (error) {
    msg.innerText = error.message;
  }

});
</script>

</body>
  </html>
