<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body style="font-family:Arial;background:#f5f5f5;padding:20px;">

<h2>User Dashboard</h2>

<p id="userEmail">Loading...</p>

<hr>

<h3>Your Referral Link</h3>
<p id="refLink">Loading...</p>
<button onclick="copyLink()">Copy Link</button>

<hr>

<h3>Stats</h3>

<p>Referrals: <span id="refCount">0</span></p>
<p>Earnings: $<span id="earnings">0</span></p>

<hr>

<h3>Request Withdrawal (Litecoin)</h3>

<p style="color:gray;font-size:13px;">
Minimum withdrawal: $1 — paid in LTC
</p>

<input id="withdrawAmount" type="number" placeholder="Enter amount (min $1)"
style="padding:10px;width:100%;margin:5px 0;">

<input id="withdrawWallet" type="text" placeholder="Enter Litecoin wallet address"
style="padding:10px;width:100%;margin:5px 0;">

<button id="withdrawBtn" style="padding:10px;width:100%;">
Request Withdrawal
</button>

<p id="withdrawMsg"></p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  addDoc,
  collection,
  serverTimestamp,
  increment
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA6CrK80BEX2WxISOLHXeySyElCGezZ5mw",
  authDomain: "cryptomice-635eb.firebaseapp.com",
  projectId: "cryptomice-635eb",
  storageBucket: "cryptomice-635eb.firebasestorage.app",
  messagingSenderId: "831908710470",
  appId: "1:831908710470:web:e95e1bdacb90309a046247"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUID = null;

/* ---------------- AUTH ---------------- */
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    window.location.href = "payment.html";
    return;
  }

  currentUID = user.uid;

  document.getElementById("userEmail").innerText =
    "Logged in as: " + user.email;

  /* SAFE REF LINK */
  document.getElementById("refLink").innerText =
    "https://cryptomice.github.io/cryptomice/payment.html?ref=" + user.uid;

  try {

    const snap = await getDoc(doc(db, "users", user.uid));

    if (snap.exists()) {
      const data = snap.data();

      document.getElementById("refCount").innerText = data.referrals ?? 0;
      document.getElementById("earnings").innerText = data.earnings ?? 0;
    }

  } catch (e) {
    console.error("User fetch error:", e);
  }

});

/* ---------------- COPY LINK ---------------- */
window.copyLink = function () {
  const link = document.getElementById("refLink").innerText;
  navigator.clipboard.writeText(link);
  alert("Copied!");
};

/* ---------------- WITHDRAW ---------------- */
document.getElementById("withdrawBtn").addEventListener("click", async () => {

  const amount = parseFloat(document.getElementById("withdrawAmount").value);
  const wallet = document.getElementById("withdrawWallet").value.trim();
  const msg = document.getElementById("withdrawMsg");

  if (!amount || amount < 1) {
    msg.innerText = "Minimum withdrawal is $1";
    return;
  }

  if (!wallet) {
    msg.innerText = "Enter Litecoin wallet address";
    return;
  }

  try {

    const userRef = doc(db, "users", currentUID);
    const snap = await getDoc(userRef);

    if (!snap.exists()) {
      msg.innerText = "User not found";
      return;
    }

    const data = snap.data();
    const earnings = data.earnings || 0;

    if (amount > earnings) {
      msg.innerText = "Insufficient balance";
      return;
    }

    await addDoc(collection(db, "withdrawals"), {
      userId: currentUID,
      email: data.email,
      amount,
      wallet,
      coin: "LTC",
      status: "pending",
      createdAt: serverTimestamp()
    });

    await updateDoc(userRef, {
      earnings: earnings - amount
    });

    document.getElementById("earnings").innerText = earnings - amount;

    document.getElementById("withdrawAmount").value = "";
    document.getElementById("withdrawWallet").value = "";

    msg.innerText = "Withdrawal request sent";

  } catch (e) {
    console.error(e);
    msg.innerText = "Withdrawal failed";
  }

});

</script>

</body>
</html>
